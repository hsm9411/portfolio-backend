# ==========================================
# Nginx Reverse Proxy Configuration
# Purpose: HTTPS Termination for NestJS Backend
# ==========================================

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name _;  # 도메인 설정 전: 모든 도메인 허용
    
    # Let's Encrypt ACME Challenge (인증서 발급용)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지는 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 서버 (실제 트래픽)
server {
    listen 443 ssl http2;
    server_name _;  # 나중에 도메인으로 변경: api.yourdomain.com

    # SSL 인증서 (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/yourdomain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain/privkey.pem;
    
    # SSL 설정 (최적화)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 로깅
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Client 설정
    client_max_body_size 10M;

    # Reverse Proxy → NestJS Backend
    location / {
        # Backend 주소 (Docker 내부 네트워크)
        proxy_pass http://portfolio-backend-dev:3000;

        # WebSocket 지원 (필요시)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 실제 클라이언트 IP 전달 (Cloudflare 대응)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # 타임아웃
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 캐시 비활성화 (API이므로)
        proxy_cache_bypass $http_upgrade;
    }

    # Health Check Endpoint (선택)
    location /health {
        proxy_pass http://portfolio-backend-dev:3000/health;
        access_log off;
    }

    # Metrics Endpoint (Prometheus - 선택)
    location /metrics {
        proxy_pass http://portfolio-backend-dev:3000/metrics;
        
        # 외부 접근 차단 (내부 모니터링만)
        allow 127.0.0.1;
        deny all;
    }
}
