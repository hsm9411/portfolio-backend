# ==========================================
# Portfolio - Global Nginx
# Prod: hsm9411.duckdns.org     → portfolio-backend:3000
# Dev:  hsm9411-dev.duckdns.org → portfolio-backend-dev:3000
# ==========================================

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name hsm9411.duckdns.org hsm9411-dev.duckdns.org;
    location / {
        return 301 https://$host$request_uri;
    }
}

# PROD
server {
    listen 443 ssl;
    http2 on;
    server_name hsm9411.duckdns.org;

    ssl_certificate     /etc/nginx/ssl/prod/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/prod/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/prod-access.log;
    error_log  /var/log/nginx/prod-error.log;

    client_max_body_size 10M;

    location / {
        proxy_pass http://portfolio-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_cache_bypass    $http_upgrade;
    }
}

