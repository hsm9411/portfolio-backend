services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG:-latest}
    container_name: portfolio-backend
    restart: unless-stopped
    # 포트 외부 노출 없음 - 통합 Nginx가 global-portfolio-network 통해 접근
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - internal        # Redis와 내부 통신
      - global          # 통합 Nginx와 통신
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - internal        # app과만 통신, Nginx에는 노출 안 함
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  internal:
    driver: bridge
  global:
    external: true
    name: global-portfolio-network

volumes:
  redis-data:
