name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Oracle Cloud
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Create project directory on server
          ssh ${USER}@${HOST} "mkdir -p ~/portfolio-backend"

          # Copy necessary files
          scp docker-compose.yml ${USER}@${HOST}:~/portfolio-backend/
          scp deploy.sh ${USER}@${HOST}:~/portfolio-backend/

          # Copy .env file (if exists on server, otherwise need to create manually)
          # Note: .env should be created manually on server with actual credentials

          # Execute deployment script
          ssh ${USER}@${HOST} "cd ~/portfolio-backend && chmod +x deploy.sh && ./deploy.sh"

      - name: Verify deployment
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
        run: |
          echo "Waiting for application to start..."
          sleep 10

          ssh ${USER}@${HOST} "docker ps"
          ssh ${USER}@${HOST} "curl -f http://localhost:3000 || exit 1"

          echo "✅ Deployment verified!"

  deploy-develop:
    name: Deploy to Development
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to development
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Create dev directory
          ssh ${USER}@${HOST} "mkdir -p ~/portfolio-backend-dev"

          # Copy files
          scp docker-compose.yml ${USER}@${HOST}:~/portfolio-backend-dev/
          scp deploy.sh ${USER}@${HOST}:~/portfolio-backend-dev/

          # Deploy with different ports (3001 for dev)
          ssh ${USER}@${HOST} "cd ~/portfolio-backend-dev && \
            sed -i 's/3000:3000/3001:3000/g' docker-compose.yml && \
            sed -i 's/portfolio-backend/portfolio-backend-dev/g' docker-compose.yml && \
            sed -i 's/portfolio-redis/portfolio-redis-dev/g' docker-compose.yml && \
            chmod +x deploy.sh && \
            export GITHUB_REPOSITORY=${GITHUB_REPOSITORY} && \
            export IMAGE_TAG=develop && \
            ./deploy.sh"

      - name: Verify development deployment
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
        run: |
          echo "Waiting for development application to start..."
          sleep 10

          ssh ${USER}@${HOST} "curl -f http://localhost:3001 || exit 1"

          echo "✅ Development deployment verified!"
