name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================
  # Job 1: Docker 이미지 빌드 & GHCR Push (공통)
  # ============================================================
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 2: main → Production 배포
  # ============================================================
  deploy-prod:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config << 'EOF'
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      - name: Prepare directories and network
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
        run: |
          ssh ${USER}@${HOST} "docker network inspect global-portfolio-network >/dev/null 2>&1 || docker network create global-portfolio-network"
          ssh ${USER}@${HOST} "mkdir -p ~/portfolio-backend/nginx/conf.d ~/portfolio-backend/nginx/ssl/prod ~/portfolio-backend/nginx/ssl/dev ~/portfolio-backend/nginx/logs"

      - name: Deploy files
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          scp docker-compose.yml              ${USER}@${HOST}:~/portfolio-backend/docker-compose.yml
          scp docker-compose.nginx.yml        ${USER}@${HOST}:~/portfolio-backend/docker-compose.nginx.yml
          scp nginx/conf.d/portfolio.conf     ${USER}@${HOST}:~/portfolio-backend/nginx/conf.d/portfolio.conf
          scp deploy.sh                       ${USER}@${HOST}:~/portfolio-backend/deploy.sh

      - name: Start or reload Nginx
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
        run: |
          ssh ${USER}@${HOST} "
            cd ~/portfolio-backend
            if docker ps --format '{{.Names}}' | grep -q '^portfolio-nginx$'; then
              docker exec portfolio-nginx nginx -t && docker exec portfolio-nginx nginx -s reload
              echo 'Nginx reloaded'
            else
              docker compose -f docker-compose.nginx.yml up -d
              echo 'Nginx started'
            fi
          "

      - name: Deploy application
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ssh ${USER}@${HOST} "cd ~/portfolio-backend && chmod +x deploy.sh && export GITHUB_REPOSITORY=${GITHUB_REPOSITORY} && export IMAGE_TAG=latest && ./deploy.sh"

      - name: Verify deployment
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
        run: |
          sleep 15
          ssh ${USER}@${HOST} "docker ps | grep portfolio"
          ssh ${USER}@${HOST} "curl -sf https://hsm9411.duckdns.org/health && echo 'HTTPS OK' || echo 'health check done'"
          echo "Production deployment verified!"

  # ============================================================
  # Job 3: develop → Development 배포
  # ============================================================
  deploy-dev:
    name: Deploy to Development
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config << 'EOF'
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      - name: Prepare directories and network
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
        run: |
          ssh ${USER}@${HOST} "docker network inspect global-portfolio-network >/dev/null 2>&1 || docker network create global-portfolio-network"
          ssh ${USER}@${HOST} "mkdir -p ~/portfolio-backend/nginx/conf.d ~/portfolio-backend/nginx/ssl/prod ~/portfolio-backend/nginx/ssl/dev ~/portfolio-backend/nginx/logs"
          ssh ${USER}@${HOST} "mkdir -p ~/portfolio-backend-dev"

      - name: Deploy Nginx files
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
        run: |
          scp docker-compose.nginx.yml        ${USER}@${HOST}:~/portfolio-backend/docker-compose.nginx.yml
          scp nginx/conf.d/portfolio.conf     ${USER}@${HOST}:~/portfolio-backend/nginx/conf.d/portfolio.conf

      - name: Start or reload Nginx
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
        run: |
          ssh ${USER}@${HOST} "
            cd ~/portfolio-backend
            if docker ps --format '{{.Names}}' | grep -q '^portfolio-nginx$'; then
              docker exec portfolio-nginx nginx -t && docker exec portfolio-nginx nginx -s reload
              echo 'Nginx reloaded'
            else
              docker compose -f docker-compose.nginx.yml up -d
              echo 'Nginx started'
            fi
          "

      - name: Deploy application
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          scp docker-compose.dev.yml  ${USER}@${HOST}:~/portfolio-backend-dev/docker-compose.yml
          scp deploy.sh               ${USER}@${HOST}:~/portfolio-backend-dev/deploy.sh
          ssh ${USER}@${HOST} "cd ~/portfolio-backend-dev && chmod +x deploy.sh && export GITHUB_REPOSITORY=${GITHUB_REPOSITORY} && export IMAGE_TAG=develop && ./deploy.sh"

      - name: Verify deployment
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
        run: |
          sleep 15
          ssh ${USER}@${HOST} "docker ps | grep portfolio"
          ssh ${USER}@${HOST} "curl -sf https://hsm9411-dev.duckdns.org/health && echo 'HTTPS OK' || echo 'health check done'"
          echo "Development deployment verified!"
