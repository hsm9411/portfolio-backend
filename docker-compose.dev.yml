services:
  # ==========================================
  # Nginx Reverse Proxy (HTTPS Only)
  # ==========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: portfolio-nginx-dev
    restart: unless-stopped
    ports:
      - "443:443"     # HTTPS만 외부 노출 (표준 포트)
    expose:
      - "80"          # HTTP는 내부에서만 사용 (health check용)
    volumes:
      # Nginx 설정 파일
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

      # Let's Encrypt SSL 인증서
      - ./nginx/ssl:/etc/nginx/ssl
      
      # Nginx 로그
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ==========================================
  # NestJS Application
  # ==========================================
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG:-latest}
    container_name: portfolio-backend-dev
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: portfolio-redis-dev
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  portfolio-network:
    driver: bridge

volumes:
  redis-data:
